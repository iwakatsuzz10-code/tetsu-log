/* ---------------- helpers ---------------- */

const keyOf = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
const todayStr = () => keyOf(new Date());
const parseKey = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const fmtDate = (s) => { const [, m, dd] = s.split("-"); return `${Number(m)}/${Number(dd)}`; };
const fmtFull = (s) => { const [y, m, d] = s.split("-"); const w = ["日","月","火","水","木","金","土"][parseKey(s).getDay()]; return `${Number(m)}月${Number(d)}日(${w})`; };
const dayLabel = () => { const d = new Date(); const w = ["日","月","火","水","木","金","土"][d.getDay()]; return `${d.getMonth() + 1}月${d.getDate()}日（${w}）`; };
const daysBetween = (a, b) => Math.round((parseKey(b) - parseKey(a)) / 86400000);

function levelFromXp(xp) {
  let level = 1;
  while (xp >= Math.round(60 * Math.pow(level, 1.6))) level++;
  const cur = level === 1 ? 0 : Math.round(60 * Math.pow(level - 1, 1.6));
  const next = Math.round(60 * Math.pow(level, 1.6));
  return { level, cur, next, pct: Math.min(100, ((xp - cur) / (next - cur)) * 100) };
}
const titleForLevel = (lv) => LEVEL_TITLES[Math.min(lv - 1, LEVEL_TITLES.length - 1)];
const totalLogs = (d) => d.weights.length + d.workouts.length + (d.photos?.length || 0);
const exerciseMeta = (name) => EXERCISE_META[name] || { mode: "weighted", start: { weight: 40, reps: 10 }, unit: "kg x 回" };
const normalizeSet = (set, mode) => {
  if (mode === "timed") return { seconds: set.seconds ?? 60 };
  if (mode === "reps") return { reps: set.reps ?? 10 };
  return { weight: set.weight ?? 40, reps: set.reps ?? 10 };
};
const defaultSetFor = (exercise) => ({ ...exerciseMeta(exercise).start });
const weightedVolume = (workout) => {
  const mode = workout.mode || exerciseMeta(workout.exercise).mode;
  if (mode !== "weighted") return 0;
  return workout.sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);
};
const totalVolume = (d) => d.workouts.reduce((s, w) => s + weightedVolume(w), 0);
const totalSets = (workouts) => workouts.reduce((s, w) => s + w.sets.length, 0);
const formatSeconds = (sec) => sec >= 60 ? `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}` : `${sec}`;
const formatSet = (set, mode) => {
  if (mode === "timed") return `${formatSeconds(set.seconds || 0)}秒`;
  if (mode === "reps") return `${set.reps || 0}回`;
  return `${set.weight || 0}kg×${set.reps || 0}`;
};
const formatWorkoutSets = (workout) => {
  const mode = workout.mode || exerciseMeta(workout.exercise).mode;
  return workout.sets.map((s) => formatSet(s, mode)).join(" / ");
};
const workoutPrimaryMetric = (workout) => {
  const mode = workout.mode || exerciseMeta(workout.exercise).mode;
  if (mode === "timed") {
    const sec = workout.sets.reduce((s, x) => s + (x.seconds || 0), 0);
    return { value: formatSeconds(sec), suffix: "秒", label: "保持時間" };
  }
  if (mode === "reps") {
    const reps = workout.sets.reduce((s, x) => s + (x.reps || 0), 0);
    return { value: reps.toLocaleString(), suffix: "回", label: "総回数" };
  }
  return { value: weightedVolume(workout).toLocaleString(), suffix: "kg", label: "重量ボリューム" };
};

function calcStreak(d) {
  const dates = new Set([...d.weights.map((w) => w.date), ...d.workouts.map((w) => w.date), ...(d.photos || []).map((p) => p.date)]);
  if (dates.size === 0) return 0;
  let streak = 0;
  const cur = new Date();
  if (!dates.has(keyOf(cur))) cur.setDate(cur.getDate() - 1);
  while (dates.has(keyOf(cur))) { streak++; cur.setDate(cur.getDate() - 1); }
  return streak;
}

const DEFAULT_DATA = {

function todaySummary(data) {
  const today = todayStr();
  const workouts = data.workouts.filter((w) => w.date === today);
  return {
    weight: data.weights.find((w) => w.date === today),
    workouts,
    volume: workouts.reduce((s, w) => s + weightedVolume(w), 0),
    sets: totalSets(workouts),
    photo: (data.photos || []).find((p) => p.date === today),
  };
}

function compressImage(file, maxSide = 960, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

}
function SectionLabel({ children, right }) {

}

function Stepper({ value, onChange, step = 1, min = 0, suffix, big }) {
  const fmt = (v) => (step < 1 ? v.toFixed(1) : String(v));
  return (
    <div style={{ display: "flex", alignItems: "center", gap: big ? 16 : 8 }}>
      <button className="step-btn" onClick={() => onChange(Math.max(min, +(value - step).toFixed(1)))}><Minus size={big ? 22 : 16} /></button>
      <div style={{
        fontFamily: "'Oswald',sans-serif", fontSize: big ? 52 : 24, fontWeight: 600,
        color: C.ink, minWidth: big ? 150 : 70, textAlign: "center", fontVariantNumeric: "tabular-nums",
        letterSpacing: "-0.01em",
      }}>
        {fmt(value)}<span style={{ fontSize: big ? 18 : 12, color: C.inkSub, marginLeft: 5, fontFamily: "inherit" }}>{suffix}</span>
      </div>
      <button className="step-btn" onClick={() => onChange(+(value + step).toFixed(1))}><Plus size={big ? 22 : 16} /></button>
    </div>
  );
}

}

function BadgeToast({ badge, onClose }) {
  useEffect(() => { if (!badge) return; const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, [badge, onClose]);
  if (!badge) return null;
  return (
    <div className="badge-toast">
      <span style={{ fontSize: 26 }}>{badge.icon}</span>
      <div>
        <Eyebrow color={C.brass}>実績解除</Eyebrow>
        <div style={{ fontSize: 15, color: C.ink, fontWeight: 800, marginTop: 2 }}>{badge.name}</div>
      </div>
    </div>
  );
}

function TetsuLog() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("home");
  const [bursts, setBursts] = useState([]);
  const [levelUp, setLevelUp] = useState(null);
  const [newBadge, setNewBadge] = useState(null);
  const prevBadges = useRef(new Set());
  const burstId = useRef(0);

  useEffect(() => {
    (async () => {
      let loaded = DEFAULT_DATA;
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res?.value) {
          const parsed = JSON.parse(res.value);
          loaded = { ...DEFAULT_DATA, ...parsed, profile: { ...DEFAULT_DATA.profile, ...(parsed.profile || {}) }, photos: parsed.photos || [] };
        }
      } catch { /* 初回 */ }
      prevBadges.current = new Set(BADGES.filter((b) => b.check(loaded)).map((b) => b.id));
      setData(loaded);
    })();
  }, []);

  const commit = useCallback(async (next, gainedXp = 0) => {
    const before = levelFromXp(next.xp - gainedXp).level;
    const after = levelFromXp(next.xp).level;
    setData(next);
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(next)); } catch (e) { console.error("保存に失敗:", e); }
    if (gainedXp > 0) {
      const id = ++burstId.current;
      setBursts((b) => [...b, { id, amount: gainedXp }]);
      setTimeout(() => setBursts((b) => b.filter((x) => x.id !== id)), 1400);
    }
    if (after > before) setLevelUp({ level: after });
    const nowBadges = BADGES.filter((b) => b.check(next));
    const fresh = nowBadges.find((b) => !prevBadges.current.has(b.id));
    prevBadges.current = new Set(nowBadges.map((b) => b.id));
    if (fresh) setNewBadge(fresh);
  }, []);

  if (!data) {
    return <div style={{ minHeight: "100vh", background: C.bg1, display: "flex", alignItems: "center", justifyContent: "center", color: C.inkSub, fontFamily: "sans-serif" }}>読み込み中…</div>;
  }

  const lv = levelFromXp(data.xp);
  const streak = calcStreak(data);

  return (
    <div style={{
      minHeight: "100vh",
      background: `radial-gradient(120% 80% at 50% -10%, #1B212C 0%, ${C.bg1} 45%, ${C.bg0} 100%)`,
      color: C.ink,
      fontFamily: "'Helvetica Neue','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",
      position: "relative", overflowX: "hidden",
    }}>
      <style>{CSS}</style>

      <div aria-hidden style={{
        position: "fixed", right: -50, top: 30, fontSize: 340, fontWeight: 900,
        color: "rgba(255,255,255,0.018)", userSelect: "none", pointerEvents: "none",
        fontFamily: "'Hiragino Mincho ProN',serif", lineHeight: 1, zIndex: 0,
      }}>鍛</div>

      <div style={{ maxWidth: 520, margin: "0 auto", padding: "22px 16px 100px", position: "relative", zIndex: 1 }}>
        <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
          <div>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 27, fontWeight: 700, letterSpacing: "0.04em", display: "flex", alignItems: "baseline", gap: 2 }}>
              鉄ログ<span style={{ color: C.ember }}>.</span>
            </div>
            <div style={{ fontSize: 12, color: C.inkSub, marginTop: 1 }}>{dayLabel()}</div>
          </div>
          <div className="streak-pill">
            <Flame size={16} color={streak > 0 ? C.ember : C.dim} fill={streak > 0 ? C.ember : "none"} />
            <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 600, fontSize: 17 }}>{streak}</span>
            <span style={{ fontSize: 11, color: C.inkSub }}>日連続</span>
          </div>
        </header>

        {tab === "home" && <HomeTab data={data} lv={lv} goTab={setTab} />}
        {tab === "workout" && <WorkoutTab data={data} commit={commit} />}
        {tab === "weight" && <WeightTab data={data} commit={commit} />}
        {tab === "photos" && <PhotosTab data={data} commit={commit} />}
        {tab === "stats" && <StatsTab data={data} />}
        {tab === "awards" && <AwardsTab data={data} lv={lv} />}
      </div>

      <nav className="tabbar">
        {[
          { id: "home", icon: Home, label: "ホーム" },
          { id: "workout", icon: Dumbbell, label: "筋トレ" },
          { id: "weight", icon: Scale, label: "体重" },
          { id: "photos", icon: Camera, label: "写真" },
          { id: "stats", icon: BarChart3, label: "成果" },
          { id: "awards", icon: Trophy, label: "実績" },
        ].map((t) => {
          const Icon = t.icon; const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => setTab(t.id)} className="tab-btn">
              <div className="tab-icon" style={{ color: active ? C.ember : C.dim, background: active ? "rgba(255,94,58,0.12)" : "transparent" }}>
                <Icon size={21} strokeWidth={active ? 2.4 : 1.9} />
              </div>
              <span style={{ fontSize: 10, fontWeight: active ? 800 : 600, color: active ? C.ember : C.dim }}>{t.label}</span>
            </button>
          );
        })}
      </nav>

      <XpBurst bursts={bursts} />
      <LevelUpModal info={levelUp} onClose={() => setLevelUp(null)} />
      <BadgeToast badge={newBadge} onClose={() => setNewBadge(null)} />
    </div>
  );
}

function WorkoutTab({ data, commit }) {
  const [muscle, setMuscle] = useState("胸");
  const [exercise, setExercise] = useState(null);
  const [sets, setSets] = useState([{ weight: 40, reps: 10 }]);
  const [date, setDate] = useState(todayStr());

  const lastOf = (ex) => [...data.workouts].reverse().find((w) => w.exercise === ex);
  const startExercise = (ex) => {
    setExercise(ex);
    const last = lastOf(ex);
    const mode = exerciseMeta(ex).mode;
    setSets(last ? last.sets.map((s) => normalizeSet(s, mode)) : [defaultSetFor(ex)]);
    setDate(todayStr());
  };

  const save = () => {
    const mode = exerciseMeta(exercise).mode;
    const normalized = sets.map((s) => normalizeSet(s, mode));
    const volume = mode === "weighted" ? normalized.reduce((s, x) => s + x.weight * x.reps, 0) : 0;
    const xpGain = 15 + sets.length * 5;
    const entry = { id: Date.now(), date, exercise, muscle, mode, sets: normalized, volume };
    commit({ ...data, workouts: [...data.workouts, entry], xp: data.xp + xpGain }, xpGain);
    setExercise(null);
  };
  const removeWorkout = (id) => commit({ ...data, workouts: data.workouts.filter((w) => w.id !== id) });

  const weekData = Array.from({ length: 7 }).map((_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    const key = keyOf(d);
    const sets = totalSets(data.workouts.filter((w) => w.date === key));
    return { day: ["日","月","火","水","木","金","土"][d.getDay()], sets };
  });

  if (exercise) {
    const last = lastOf(exercise);
    const meta = exerciseMeta(exercise);
    const mode = meta.mode;
    const normalizedSets = sets.map((s) => normalizeSet(s, mode));
    const metric = workoutPrimaryMetric({ exercise, mode, sets: normalizedSets });
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <button className="back-btn" onClick={() => setExercise(null)}>← 戻る</button>
        <div>
          <span style={{ fontSize: 12, color: C.ember, fontWeight: 800 }}>{muscle}</span>
          <h2 style={{ fontSize: 25, fontWeight: 800, margin: "2px 0 0" }}>{exercise}</h2>
          {last && (
            <button className="copy-chip" onClick={() => setSets(last.sets.map((s) => normalizeSet(s, mode)))}>
              <Copy size={12} /> 前回: {formatWorkoutSets(last)}
            </button>
          )}
          <div style={{ fontSize: 12, color: C.inkSub, marginTop: 8 }}>記録単位：{meta.unit}</div>
        </div>

        <Panel style={{ padding: "12px 14px", display: "flex", alignItems: "center", gap: 10 }}>
          <Calendar size={16} color={C.inkSub} />
          <span style={{ fontSize: 13, color: C.inkSub }}>記録日</span>
          <input type="date" className="date-input" value={date} max={todayStr()} onChange={(e) => setDate(e.target.value)} />
        </Panel>

        {sets.map((s, i) => (
          <Panel key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, padding: "14px" }}>
            <div style={{ fontFamily: "'Oswald',sans-serif", color: C.inkSub, fontWeight: 600, width: 26 }}>#{i + 1}</div>
            {mode === "weighted" && (
              <>
                <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
                  <span style={{ fontSize: 10, color: C.inkSub }}>重量</span>
                  <Stepper value={s.weight} step={2.5} suffix="kg" onChange={(v) => setSets(sets.map((x, j) => (j === i ? { ...x, weight: v } : x)))} />
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
                  <span style={{ fontSize: 10, color: C.inkSub }}>回数</span>
                  <Stepper value={s.reps} step={1} min={1} suffix="回" onChange={(v) => setSets(sets.map((x, j) => (j === i ? { ...x, reps: v } : x)))} />
                </div>
              </>
            )}
            {mode === "reps" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
                <span style={{ fontSize: 10, color: C.inkSub }}>回数</span>
                <Stepper value={s.reps} step={1} min={1} suffix="回" onChange={(v) => setSets(sets.map((x, j) => (j === i ? { ...x, reps: v } : x)))} />
              </div>
            )}
            {mode === "timed" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
                <span style={{ fontSize: 10, color: C.inkSub }}>時間</span>
                <Stepper value={s.seconds} step={10} min={10} suffix="秒" onChange={(v) => setSets(sets.map((x, j) => (j === i ? { ...x, seconds: v } : x)))} />
              </div>
            )}
            <button className="icon-btn" onClick={() => setSets(sets.filter((_, j) => j !== i))} disabled={sets.length === 1}><Trash2 size={16} /></button>
          </Panel>
        ))}

        <button className="ghost-btn" onClick={() => setSets([...sets, normalizeSet(sets[sets.length - 1], mode)])}><Plus size={16} /> セットを追加</button>

        <Panel style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: `linear-gradient(168deg, ${C.panelHi}, ${C.panel})` }}>
          <span style={{ fontSize: 13, color: C.inkSub }}>{metric.label}</span>
          <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 30, fontWeight: 700, color: C.brass }}>{metric.value}<span style={{ fontSize: 13, color: C.inkSub }}> {metric.suffix}</span></span>
        </Panel>

        <button className="primary-btn big" onClick={save}><Zap size={18} fill="#2A1208" /> 記録する（+{15 + sets.length * 5} XP）</button>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div>
        <SectionLabel>週間トレーニング</SectionLabel>
        <Panel style={{ padding: "14px 8px 6px" }}>
          <ResponsiveContainer width="100%" height={130}>
            <BarChart data={weekData} margin={{ top: 4, right: 8, left: 8, bottom: 0 }}>
              <defs>
                <linearGradient id="barEmber" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={C.emberSoft} /><stop offset="100%" stopColor={C.ember} />
                </linearGradient>
              </defs>
              <XAxis dataKey="day" tick={{ fill: C.inkSub, fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip cursor={{ fill: "rgba(255,255,255,0.04)" }} contentStyle={tipStyle} formatter={(v) => [`${v.toLocaleString()} セット`, "セット数"]} />
                <Bar dataKey="sets" fill="url(#barEmber)" radius={[5, 5, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </Panel>
      </div>

      <div>
        <SectionLabel>部位を選ぶ</SectionLabel>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {Object.keys(EXERCISES).map((m) => (
            <button key={m} onClick={() => setMuscle(m)} className="muscle-chip"
              style={{ background: muscle === m ? C.ember : C.panel, color: muscle === m ? "#1A0E08" : C.ink, borderColor: muscle === m ? C.ember : C.stroke }}>{m}</button>
          ))}
        </div>
      </div>

      <div>
        <SectionLabel>種目を選ぶ</SectionLabel>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {EXERCISES[muscle].map((ex) => {
            const last = [...data.workouts].reverse().find((w) => w.exercise === ex);
            return (
              <button key={ex} className="exercise-row" onClick={() => startExercise(ex)}>
                <div style={{ textAlign: "left" }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{ex}</div>
                  {last && <div style={{ fontSize: 11, color: C.inkSub, marginTop: 2 }}>前回 {fmtDate(last.date)}: {formatWorkoutSets(last)}</div>}
                </div>
                <ChevronRight size={18} color={C.dim} />
              </button>
            );
          })}
        </div>
      </div>

      {data.workouts.length > 0 && (
        <div>
          <SectionLabel>最近の記録</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {[...data.workouts].reverse().slice(0, 8).map((w) => (
              <Panel key={w.id} style={{ padding: "11px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <span style={{ fontSize: 11, color: C.inkSub, marginRight: 8 }}>{fmtDate(w.date)}</span>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{w.exercise}</span>
                  <div style={{ fontSize: 11, color: C.inkSub }}>{formatWorkoutSets(w)}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  {(() => {
                    const metric = workoutPrimaryMetric(w);
                    return <span style={{ fontFamily: "'Oswald',sans-serif", color: C.brass, fontWeight: 600, fontSize: 14 }}>{metric.value}{metric.suffix}</span>;
                  })()}
                  <button className="icon-btn" onClick={() => removeWorkout(w.id)}><Trash2 size={14} /></button>
                </div>
              </Panel>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= WEIGHT (過去日付対応) ================= */

function WeightTab({ data, commit }) {
  const sorted = [...data.weights].sort((a, b) => a.date.localeCompare(b.date));
  const latest = sorted.length ? sorted[sorted.length - 1].kg : 65.0;
  const [kg, setKg] = useState(latest);
  const [date, setDate] = useState(todayStr());
  const [goalInput, setGoalInput] = useState(data.profile.goalWeight ?? "");
  const [editing, setEditing] = useState(false);

  const existingForDate = data.weights.find((w) => w.date === date);
  const isPast = date !== todayStr();

  const save = () => {
    const others = data.weights.filter((w) => w.date !== date);
    const isNew = !existingForDate;
    // XPは「今日」かつ新規のみ付与（過去日埋めはXPなし=不正防止）
    const xpGain = (isNew && !isPast) ? 10 : 0;
    const weights = [...others, { date, kg }].sort((a, b) => a.date.localeCompare(b.date));
    // startWeightを最古の記録に同期
    const profile = { ...data.profile, startWeight: weights[0]?.kg ?? null };
    commit({ ...data, weights, profile, xp: data.xp + xpGain }, xpGain);
    setEditing(false);
  };
  const removeWeight = (d) => {
    const weights = data.weights.filter((w) => w.date !== d);
    const profile = { ...data.profile, startWeight: weights.length ? [...weights].sort((a,b)=>a.date.localeCompare(b.date))[0].kg : null };
    commit({ ...data, weights, profile });
  };
  const saveGoal = () => { const g = parseFloat(goalInput); if (!isNaN(g) && g > 0) commit({ ...data, profile: { ...data.profile, goalWeight: g } }); };

  const chartData = sorted.slice(-30).map((w) => ({ date: fmtDate(w.date), kg: w.kg }));
  const goal = data.profile.goalWeight;
  const lo = chartData.length ? Math.min(...chartData.map((d) => d.kg), goal ?? Infinity) : 0;
  const hi = chartData.length ? Math.max(...chartData.map((d) => d.kg), goal ?? -Infinity) : 100;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Panel glow="rgba(95,212,154,0.18)" style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "22px 16px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Calendar size={15} color={C.inkSub} />
          <input type="date" className="date-input" value={date} max={todayStr()} onChange={(e) => { setDate(e.target.value); const ex = data.weights.find((w) => w.date === e.target.value); setKg(ex ? ex.kg : latest); }} />
          {isPast && <span className="past-tag">過去日</span>}
        </div>
        <Eyebrow color={existingForDate ? C.brass : C.inkSub}>{existingForDate ? "記録を上書き" : "新規記録"}</Eyebrow>
        <Stepper value={kg} step={0.1} suffix="kg" big onChange={setKg} />
        <div style={{ display: "flex", gap: 8 }}>
          {[-0.5, -0.1, +0.1, +0.5].map((d) => (
            <button key={d} className="quick-chip" onClick={() => setKg(+(kg + d).toFixed(1))}>{d > 0 ? `+${d}` : d}</button>
          ))}
        </div>
        <button className="primary-btn big" style={{ width: "100%", background: `linear-gradient(135deg, ${C.jade}, #8FE6BD)`, color: "#06251A", boxShadow: "0 4px 16px rgba(95,212,154,0.25)" }} onClick={save}>
          <Zap size={18} fill="#06251A" /> {existingForDate ? "上書きする" : (isPast ? "過去の記録を追加" : "記録する（+10 XP）")}
        </button>
      </Panel>

      {chartData.length >= 2 && (
        <div>
          <SectionLabel>推移（直近30件）</SectionLabel>
          <Panel style={{ padding: "16px 8px 8px" }}>
            <ResponsiveContainer width="100%" height={190}>
              <AreaChart data={chartData} margin={{ top: 4, right: 14, left: -14, bottom: 0 }}>
                <defs>
                  <linearGradient id="wFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.jade} stopOpacity={0.35} />
                    <stop offset="100%" stopColor={C.jade} stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid stroke={C.stroke} strokeDasharray="3 4" vertical={false} />
                <XAxis dataKey="date" tick={{ fill: C.inkSub, fontSize: 10 }} axisLine={false} tickLine={false} minTickGap={20} />
                <YAxis domain={[Math.floor(lo - 1), Math.ceil(hi + 1)]} tick={{ fill: C.inkSub, fontSize: 10 }} axisLine={false} tickLine={false} width={36} />
                <Tooltip contentStyle={tipStyle} formatter={(v) => [`${v} kg`, "体重"]} />
                {goal && <ReferenceLine y={goal} stroke={C.brass} strokeDasharray="6 4" label={{ value: `目標 ${goal}`, fill: C.brass, fontSize: 10, position: "insideTopRight" }} />}
                <Area type="monotone" dataKey="kg" stroke={C.jade} strokeWidth={2.5} fill="url(#wFill)" dot={{ r: 2.5, fill: C.jade }} activeDot={{ r: 5 }} />
              </AreaChart>
            </ResponsiveContainer>
          </Panel>
        </div>
      )}

      <div>
        <SectionLabel>目標体重</SectionLabel>
        <Panel style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <Target size={18} color={C.brass} />
          <input className="goal-input" type="number" step="0.1" placeholder="例: 65.0" value={goalInput} onChange={(e) => setGoalInput(e.target.value)} />
          <span style={{ color: C.inkSub, fontSize: 13 }}>kg</span>
          <button className="ghost-btn" style={{ padding: "9px 16px" }} onClick={saveGoal}>設定</button>
        </Panel>
      </div>

      {data.weights.length > 0 && (
        <div>
          <SectionLabel right={<button className="text-link" onClick={() => setEditing(!editing)}>{editing ? "完了" : "編集"}</button>}>履歴（全{data.weights.length}件）</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 320, overflowY: "auto" }}>
            {[...data.weights].sort((a, b) => b.date.localeCompare(a.date)).map((w, i, arr) => {
              const prev = arr[i + 1];
              const diff = prev ? +(w.kg - prev.kg).toFixed(1) : null;
              return (
                <Panel key={w.date} style={{ padding: "11px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: C.inkSub }}>{fmtFull(w.date)}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 600, fontSize: 16 }}>{w.kg.toFixed(1)} kg</span>
                    {diff !== null && diff !== 0 && (
                      <span style={{ fontSize: 12, fontWeight: 800, color: diff < 0 ? C.jade : C.emberSoft }}>{diff > 0 ? `+${diff}` : diff}</span>
                    )}
                    {editing && <button className="icon-btn" onClick={() => removeWeight(w.date)}><Trash2 size={14} /></button>}
                  </div>
                </Panel>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= PHOTOS ================= */

function PhotosTab({ data, commit }) {
  const fileRef = useRef(null);
  const [date, setDate] = useState(todayStr());
  const [note, setNote] = useState("");
  const [busy, setBusy] = useState(false);
  const photos = [...(data.photos || [])].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  const chronological = [...photos].reverse();
  const first = chronological[0];
  const latest = chronological[chronological.length - 1];
  const todayPhoto = (data.photos || []).find((p) => p.date === todayStr());

  const savePhoto = async (file) => {
    if (!file) return;
    setBusy(true);
    try {
      const src = await compressImage(file);
      const weight = data.weights.find((w) => w.date === date);
      const dayWorkouts = data.workouts.filter((w) => w.date === date);
      const volume = dayWorkouts.reduce((s, w) => s + weightedVolume(w), 0);
      const trainingNote = dayWorkouts.length ? `${dayWorkouts.length}種目/${totalSets(dayWorkouts)}セット` : null;
      const isToday = date === todayStr();
      const isFirstToday = isToday && !(data.photos || []).some((p) => p.date === date);
      const entry = { id: Date.now(), date, src, note: note.trim(), weightKg: weight?.kg ?? null, volume, trainingNote };
      commit({ ...data, photos: [...(data.photos || []), entry], xp: data.xp + (isFirstToday ? 12 : 0) }, isFirstToday ? 12 : 0);
      setNote("");
      if (fileRef.current) fileRef.current.value = "";
    } catch (e) {
      alert("写真の保存に失敗しました。別の画像で試してください。");
      console.error(e);
    } finally {
      setBusy(false);
    }
  };

  const removePhoto = (id) => commit({ ...data, photos: (data.photos || []).filter((p) => p.id !== id) });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Panel glow={todayPhoto ? "rgba(139,123,232,0.22)" : "rgba(230,180,80,0.12)"}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div>
            <Eyebrow color={C.violet}>Body Line</Eyebrow>
            <div style={{ fontSize: 20, fontWeight: 900, marginTop: 4 }}>{todayPhoto ? "今日の写真は保存済み" : "今日の体ラインを残す"}</div>
            <div style={{ fontSize: 12, color: C.inkSub, marginTop: 4, lineHeight: 1.5 }}>同じ角度・同じ光で撮るほど、数週間後の変化が見えやすくなります。</div>
          </div>
          <div style={{ width: 54, height: 54, borderRadius: 16, background: "rgba(139,123,232,0.14)", display: "flex", alignItems: "center", justifyContent: "center", color: C.violet }}>
            <Camera size={28} />
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 16 }}>
          <Calendar size={15} color={C.inkSub} />
          <input type="date" className="date-input" value={date} max={todayStr()} onChange={(e) => setDate(e.target.value)} />
        </div>
        <textarea className="note-input" placeholder="メモ：正面、腹筋の見え方、姿勢、コンディションなど" value={note} onChange={(e) => setNote(e.target.value)} />
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={(e) => savePhoto(e.target.files?.[0])} />
        <button className="primary-btn big" style={{ width: "100%", marginTop: 12, background: `linear-gradient(135deg, ${C.violet}, #B5A8FF)`, color: "#100C2D", boxShadow: "0 4px 18px rgba(139,123,232,0.32)" }} onClick={() => fileRef.current?.click()} disabled={busy}>
          <Camera size={18} /> {busy ? "保存中..." : (todayPhoto ? "もう1枚追加する" : "写真を撮る / 選ぶ（+12 XP）")}
        </button>
      </Panel>

      {first && latest && first.id !== latest.id && (
        <div>
          <SectionLabel>変化の比較</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[{ label: "最初", p: first }, { label: "最新", p: latest }].map(({ label, p }) => (
              <Panel key={label} style={{ padding: 10 }}>
                <div className="photo-frame"><img src={p.src} alt={`${label}の体ライン`} /></div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: C.inkSub }}>
                  <span>{label}</span><span>{fmtDate(p.date)}</span>
                </div>
              </Panel>
            ))}
          </div>
        </div>
      )}

      {photos.length > 0 ? (
        <div>
          <SectionLabel>写真ログ（{photos.length}枚）</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {photos.map((p) => (
              <Panel key={p.id} style={{ padding: 10 }}>
                <div className="photo-frame"><img src={p.src} alt={`${fmtDate(p.date)}の体ライン`} /></div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, gap: 8 }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 800 }}>{fmtFull(p.date)}</div>
                    <div style={{ fontSize: 10, color: C.inkSub, marginTop: 2 }}>
                      {p.weightKg ? `${p.weightKg.toFixed(1)}kg` : "体重なし"} ・ {p.trainingNote || (p.volume ? `重量 ${p.volume.toLocaleString()}kg` : "筋トレなし")}
                    </div>
                  </div>
                  <button className="icon-btn" onClick={() => removePhoto(p.id)}><Trash2 size={14} /></button>
                </div>
                {p.note && <div style={{ fontSize: 11, color: C.inkSub, lineHeight: 1.45, marginTop: 7 }}>{p.note}</div>}
              </Panel>
            ))}
          </div>
        </div>
      ) : (
        <div style={{ textAlign: "center", padding: "46px 20px", color: C.inkSub }}>
          <Camera size={38} color={C.dim} />
          <div style={{ fontSize: 14, marginTop: 12 }}>写真を残すと、体重だけでは見えない変化を追えます。</div>
        </div>
      )}
    </div>
  );
}

/* ================= STATS（成果の可視化）================= */

function StatsTab({ data }) {
  const sorted = [...data.weights].sort((a, b) => a.date.localeCompare(b.date));
  const photos = [...(data.photos || [])].sort((a, b) => a.date.localeCompare(b.date));
  const hasW = sorted.length >= 1;
  const start = hasW ? sorted[0] : null;
  const latest = hasW ? sorted[sorted.length - 1] : null;
  const goal = data.profile.goalWeight;
  const totalDelta = hasW ? +(latest.kg - start.kg).toFixed(1) : 0;

  // 7日移動平均（ノイズを消して「本当の傾向」を見せる）
  const ma = useMemo(() => {
    return sorted.map((w, i) => {
      const win = sorted.slice(Math.max(0, i - 6), i + 1);
      const avg = win.reduce((s, x) => s + x.kg, 0) / win.length;
      return { date: fmtDate(w.date), kg: w.kg, ma: +avg.toFixed(2) };
    });
  }, [sorted]);

  // 直近7日 vs その前7日の平均で勢いを判定
  const momentum = useMemo(() => {
    if (sorted.length < 4) return null;
    const last7 = sorted.slice(-7), prev7 = sorted.slice(-14, -7);
    if (!prev7.length) return null;
    const a = last7.reduce((s, x) => s + x.kg, 0) / last7.length;
    const b = prev7.reduce((s, x) => s + x.kg, 0) / prev7.length;
    return +(a - b).toFixed(2);
  }, [sorted]);

  // 目標到達予測
  const projection = useMemo(() => {
    if (!goal || sorted.length < 2) return null;
    const recent = sorted.slice(-14);
    if (recent.length < 2) return null;
    const days = daysBetween(recent[0].date, recent[recent.length - 1].date) || 1;
    const ratePerDay = (recent[recent.length - 1].kg - recent[0].kg) / days;
    const remaining = goal - latest.kg;
    if (Math.abs(ratePerDay) < 0.001) return null;
    if ((remaining < 0) !== (ratePerDay < 0)) return { off: true }; // 目標と逆方向
    const daysLeft = Math.ceil(remaining / ratePerDay);
    if (daysLeft <= 0 || daysLeft > 2000) return null;
    const eta = new Date(); eta.setDate(eta.getDate() + daysLeft);
    return { daysLeft, eta: keyOf(eta), ratePerWeek: +(ratePerDay * 7).toFixed(2) };
  }, [sorted, goal, latest]);

  // 部位別の重量ボリューム（重量系種目のみ）
  const muscleVol = useMemo(() => {
    const m = {};
    data.workouts.forEach((w) => {
      const vol = weightedVolume(w);
      if (vol > 0) m[w.muscle] = (m[w.muscle] || 0) + vol;
    });
    return Object.entries(m).map(([name, vol]) => ({ name, vol })).sort((a, b) => b.vol - a.vol);
  }, [data.workouts]);

  // 月別トレ回数（直近6ヶ月）
  const monthly = useMemo(() => {
    const out = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      const days = new Set(data.workouts.filter((w) => w.date.startsWith(ym)).map((w) => w.date));
      out.push({ month: `${d.getMonth() + 1}月`, days: days.size });
    }
    return out;
  }, [data.workouts]);

  if (!hasW && data.workouts.length === 0 && photos.length === 0) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "60px 20px", textAlign: "center" }}>
        <BarChart3 size={40} color={C.dim} />
        <div style={{ color: C.inkSub, fontSize: 14 }}>記録が貯まると、ここに成果が<br />グラフで可視化されます。</div>
        <div style={{ fontSize: 12, color: C.dim }}>まずは体重か筋トレを記録してみましょう。</div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* 体重の総変化 ハイライト */}
      {hasW && (
        <Panel glow={totalDelta <= 0 ? "rgba(95,212,154,0.2)" : "rgba(255,94,58,0.18)"}>
          <Eyebrow color={C.brass}>開始からの変化</Eyebrow>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginTop: 8 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 52, fontWeight: 700, color: totalDelta <= 0 ? C.jade : C.emberSoft, lineHeight: 0.9 }}>
                {totalDelta > 0 ? "+" : ""}{totalDelta}
              </span>
              <span style={{ fontSize: 16, color: C.inkSub }}>kg</span>
              {totalDelta <= 0 ? <TrendingDown size={22} color={C.jade} /> : <TrendingUp size={22} color={C.emberSoft} />}
            </div>
            <div style={{ textAlign: "right", fontSize: 12, color: C.inkSub, lineHeight: 1.5 }}>
              {start.kg.toFixed(1)} → <span style={{ color: C.ink, fontWeight: 700 }}>{latest.kg.toFixed(1)}</span> kg<br />
              <span style={{ fontSize: 11 }}>{fmtDate(start.date)} 〜 {fmtDate(latest.date)}・{sorted.length}回計測</span>
            </div>
          </div>
        </Panel>
      )}

      {photos.length > 0 && (
        <Panel glow="rgba(139,123,232,0.16)" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div>
            <Eyebrow color={C.violet}>Body Photos</Eyebrow>
            <div style={{ fontSize: 18, fontWeight: 900, marginTop: 5 }}>{photos.length}枚の体ライン記録</div>
            <div style={{ fontSize: 12, color: C.inkSub, marginTop: 3 }}>{fmtDate(photos[0].date)} 〜 {fmtDate(photos[photos.length - 1].date)}</div>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 4, color: C.violet }}>
            <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 38, fontWeight: 700 }}>{photos.length}</span>
            <span style={{ fontSize: 13, color: C.inkSub }}>shots</span>
          </div>
        </Panel>
      )}

      {/* 移動平均トレンド */}
      {ma.length >= 3 && (
        <div>
          <SectionLabel right={<span style={{ fontSize: 10, color: C.inkSub }}>● 実測 <span style={{ color: C.brass }}>― 7日平均</span></span>}>体重トレンド</SectionLabel>
          <Panel style={{ padding: "16px 8px 8px" }}>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={ma} margin={{ top: 4, right: 14, left: -14, bottom: 0 }}>
                <CartesianGrid stroke={C.stroke} strokeDasharray="3 4" vertical={false} />
                <XAxis dataKey="date" tick={{ fill: C.inkSub, fontSize: 10 }} axisLine={false} tickLine={false} minTickGap={24} />
                <YAxis domain={["dataMin - 1", "dataMax + 1"]} tick={{ fill: C.inkSub, fontSize: 10 }} axisLine={false} tickLine={false} width={36} />
                <Tooltip contentStyle={tipStyle} formatter={(v, n) => [`${v} kg`, n === "ma" ? "7日平均" : "実測"]} />
                {goal && <ReferenceLine y={goal} stroke={C.brass} strokeDasharray="6 4" label={{ value: `目標`, fill: C.brass, fontSize: 10, position: "insideTopRight" }} />}
                <Line type="monotone" dataKey="kg" stroke={C.jade} strokeWidth={1} dot={{ r: 2, fill: C.jade }} strokeOpacity={0.5} />
                <Line type="monotone" dataKey="ma" stroke={C.brass} strokeWidth={2.8} dot={false} />
              </LineChart>
            </ResponsiveContainer>
          </Panel>
        </div>
      )}

      {/* 勢い + 予測 */}
      {(momentum !== null || projection) && (
        <div style={{ display: "grid", gridTemplateColumns: projection && !projection.off ? "1fr 1fr" : "1fr", gap: 12 }}>
          {momentum !== null && (
            <Panel>
              <Eyebrow>直近の勢い</Eyebrow>
              <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 26, fontWeight: 700, color: momentum <= 0 ? C.jade : C.emberSoft, marginTop: 6 }}>
                {momentum > 0 ? "+" : ""}{momentum} <span style={{ fontSize: 12, color: C.inkSub }}>kg/週</span>
              </div>
              <div style={{ fontSize: 11, color: C.inkSub, marginTop: 2 }}>過去7日 vs その前7日</div>
            </Panel>
          )}
          {projection && !projection.off && (
            <Panel glow="rgba(230,180,80,0.15)">
              <Eyebrow color={C.brass}>目標到達予測</Eyebrow>
              <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 26, fontWeight: 700, color: C.brass, marginTop: 6 }}>
                あと{projection.daysLeft}<span style={{ fontSize: 12, color: C.inkSub }}>日</span>
              </div>
              <div style={{ fontSize: 11, color: C.inkSub, marginTop: 2 }}>このペースなら {fmtDate(projection.eta)} 頃</div>
            </Panel>
          )}
          {projection && projection.off && (
            <Panel>
              <Eyebrow>目標到達予測</Eyebrow>
              <div style={{ fontSize: 13, color: C.inkSub, marginTop: 8, lineHeight: 1.5 }}>今のペースは目標と逆方向です。直近の傾向を見直しましょう。</div>
            </Panel>
          )}
        </div>
      )}

      {/* 部位別ボリューム */}
      {muscleVol.length > 0 && (
        <div>
          <SectionLabel>部位別の重量ボリューム</SectionLabel>
          <Panel style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {muscleVol.map((m) => {
              const max = muscleVol[0].vol || 1;
              return (
                <div key={m.name}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700 }}>{m.name}</span>
                    <span style={{ fontFamily: "'Oswald',sans-serif", color: C.inkSub }}>{m.vol.toLocaleString()} kg</span>
                  </div>
                  <div style={{ height: 8, background: C.bg0, borderRadius: 999, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(m.vol / max) * 100}%`, background: `linear-gradient(90deg, ${C.ember}, ${C.brass})`, borderRadius: 999 }} />
                  </div>
                </div>
              );
            })}
          </Panel>
        </div>
      )}

      {/* 月別トレ日数 */}
      {data.workouts.length > 0 && (
        <div>
          <SectionLabel>月別トレーニング日数</SectionLabel>
          <Panel style={{ padding: "14px 8px 6px" }}>
            <ResponsiveContainer width="100%" height={130}>
              <BarChart data={monthly} margin={{ top: 4, right: 8, left: 8, bottom: 0 }}>
                <defs>
                  <linearGradient id="barViolet" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.violet} /><stop offset="100%" stopColor="#6A5BC4" />
                  </linearGradient>
                </defs>
                <XAxis dataKey="month" tick={{ fill: C.inkSub, fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip cursor={{ fill: "rgba(255,255,255,0.04)" }} contentStyle={tipStyle} formatter={(v) => [`${v} 日`, "トレ日数"]} />
                <Bar dataKey="days" fill="url(#barViolet)" radius={[5, 5, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </Panel>
        </div>
      )}
    </div>
  );
}

/* ================= AWARDS ================= */

function AwardsTab({ data, lv }) {
  const unlocked = BADGES.filter((b) => b.check(data));
  const vol = totalVolume(data);
  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `tetsulog-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
        {[
          { label: "総XP", value: data.xp.toLocaleString() },
          { label: "重量系", value: `${(vol / 1000).toFixed(1)}t` },
          { label: "総記録数", value: totalLogs(data) },
        ].map((s) => (
          <Panel key={s.label} style={{ textAlign: "center", padding: "16px 8px" }}>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 23, fontWeight: 700, color: C.brass }}>{s.value}</div>
            <div style={{ fontSize: 10, color: C.inkSub, marginTop: 3 }}>{s.label}</div>
          </Panel>
        ))}
      </div>

      <div>
        <SectionLabel>実績バッジ（{unlocked.length}/{BADGES.length}）</SectionLabel>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {BADGES.map((b) => {
            const got = b.check(data);
            return (
              <Panel key={b.id} glow={got ? "rgba(230,180,80,0.2)" : null} style={{
                opacity: got ? 1 : 0.5, textAlign: "center", padding: "18px 10px",
                border: got ? `1px solid ${C.brass}55` : `1px solid ${C.stroke}`,
              }}>
                <div style={{ fontSize: 30 }}>{got ? b.icon : <Lock size={24} color={C.dim} />}</div>
                <div style={{ fontWeight: 800, fontSize: 13, marginTop: 6 }}>{b.name}</div>
                <div style={{ fontSize: 11, color: C.inkSub, marginTop: 2 }}>{b.desc}</div>
              </Panel>
            );
          })}
        </div>
      </div>

      <div style={{ textAlign: "center", fontSize: 12, color: C.inkSub, padding: "8px 0 0" }}>
        現在の称号：<span style={{ color: C.brass, fontWeight: 800 }}>{titleForLevel(lv.level)}</span> — 次は「{titleForLevel(Math.min(lv.level + 1, LEVEL_TITLES.length))}」
      </div>

      <button className="ghost-btn" onClick={exportData}><Download size={16} /> データを書き出す</button>
    </div>
  );
}
